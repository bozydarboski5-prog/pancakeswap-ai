description: 'Farming Planner Skill Evaluation'

prompts:
  - |
    You are an AI assistant. The user has loaded the following skill:

    <skill>
    {{skill_content}}
    </skill>

    Now answer the following user request:

    <user_request>
    {{case_content}}
    </user_request>

providers:
  - id: anthropic:claude-sonnet-4-5-20250929
    config:
      temperature: 0
      max_tokens: 4096

defaultTest:
  options:
    timeout: 180000
  vars:
    skill_content: file://../../../packages/plugins/pancakeswap-farming/skills/farming-planner/SKILL.md

tests:
  # Test 1: Basic CAKE staking
  - vars:
      case_content: file://cases/basic-cake-staking.md
    assert:
      - type: llm-rubric
        value: file://rubrics/farming-correctness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains-any
        value:
          - 'pancakeswap.finance/cake-staking'
          - 'pancakeswap.finance/pools'
          - 'veCAKE'
      - type: contains-any
        value:
          - '0x0E09FaBB73Bd3Ade0a17ECC321fD13a19e81cE82'
          - 'CAKE'

  # Test 2: LP farming plan
  - vars:
      case_content: file://cases/lp-farming.md
    assert:
      - type: llm-rubric
        value: file://rubrics/farming-correctness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains-any
        value:
          - 'pancakeswap.finance/farms'
          - 'pancakeswap.finance/liquidity'
      - type: contains-any
        value:
          - 'impermanent loss'
          - 'IL'
          - 'risk'

  # Test 3: veCAKE and gauge voting
  - vars:
      case_content: file://cases/vecake-gauges.md
    assert:
      - type: llm-rubric
        value: file://rubrics/farming-correctness.txt
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains-any
        value:
          - 'veCAKE'
          - 'vecake'
          - 'gauge'
      - type: contains-any
        value:
          - 'boost'
          - 'bCAKE'
          - 'revenue'
          - 'voting'
